<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sisteme Giriş | Yemekhane ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-10 rounded-[2rem] shadow-xl border border-slate-200 w-full max-w-sm text-center">
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </div>
        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Sisteme Giriş Yapın</h2>
        <p class="text-slate-500 text-xs font-bold mt-2 uppercase tracking-widest mb-8">Yıldız Teknik Üniversitesi</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="bg-rose-50 text-rose-600 p-3 rounded-xl font-bold text-xs mb-6 border border-rose-200">
                ⚠️ {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div class="text-left">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Kullanıcı Adı</label>
                <input type="text" name="kullanici_adi" required placeholder="Örn: batuhan" autocomplete="off" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500 focus:bg-white transition shadow-inner">
            </div>
            <div class="text-left">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Şifre</label>
                <input type="password" name="sifre" required placeholder="••••" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl font-bold text-slate-800 outline-none focus:border-indigo-500 focus:bg-white transition shadow-inner">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-md transition mt-2">
                Giriş Yap
            </button>
        </form>
    </div>
</body>
</html>
